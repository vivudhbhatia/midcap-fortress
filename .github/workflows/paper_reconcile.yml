name: Paper Reconcile (Alpaca)

on:
  workflow_dispatch:
    inputs:
      max_symbols:
        description: "Universe size"
        required: true
        default: "60"
      place_stops:
        description: "true or false"
        required: true
        default: "false"
  schedule:
    # 15:15 UTC Mon–Fri (after US market open in both DST and Standard time)
    - cron: "15 15 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Paper reconcile
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          MFP_TRADING_ENABLED: ${{ secrets.MFP_TRADING_ENABLED }}
          MFP_ALPACA_PAPER: "true"
        run: |
          MAX="${{ github.event.inputs.max_symbols }}"
          PST="${{ github.event.inputs.place_stops }}"
          if [ -z "$MAX" ]; then MAX="60"; fi
          if [ -z "$PST" ]; then PST="false"; fi
          mfp ops "/mfp paper-reconcile max_symbols=${MAX} place_stops=${PST}"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: mfp-reports
          path: reports
          if-no-files-found: error
